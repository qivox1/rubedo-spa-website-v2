<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://www.rubedo-spa.de/atem-loslassen.html">
    <title>Loslassen · 3 · 6 · 9 — Atem | Rubedo Inner Circle</title>
<link rel="stylesheet" href="/fonts/fonts.css">
<link rel="stylesheet" href="/styles.css">
<style>
  html, body { background: var(--cream); }
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 64px 24px; }

  .atem { width: 100%; max-width: 600px; text-align: center; }
  .atem-eb { font-family: var(--sans); font-size: 10.5px; font-weight: 600; letter-spacing: .28em; text-transform: uppercase; color: var(--brass); display: inline-flex; align-items: center; gap: 16px; margin-bottom: 26px; }
  .atem-eb::before, .atem-eb::after { content: ''; width: 34px; height: 1px; background: var(--brass); opacity: .65; }
  .atem-title { font-family: var(--serif); font-weight: 400; font-size: clamp(34px, 6vw, 52px); line-height: 1; letter-spacing: -.015em; color: var(--text-1); margin: 0; }
  .atem-title .latin { font-style: italic; color: var(--burgundy); font-weight: 500; }
  .atem-rhythm { font-family: var(--sans); font-size: 12px; letter-spacing: .24em; color: var(--brass); margin: 18px 0 0; font-variant-numeric: tabular-nums; }
  .atem-sub { font-family: var(--serif); font-style: italic; font-size: clamp(16px, 2.2vw, 19px); color: var(--text-2); margin: 16px auto 0; max-width: 40ch; line-height: 1.5; }

  .stage { position: relative; width: min(340px, 80vw); aspect-ratio: 1; margin: 52px auto 0; display: grid; place-items: center; cursor: pointer; }
  .stage svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); pointer-events: none; }
  .ring-track { fill: none; stroke: rgba(168,136,74,.16); stroke-width: 1; }
  .ring-arc   { fill: none; stroke: var(--brass); stroke-width: 1.5; stroke-linecap: round; }

  .orb { width: 78%; height: 78%; border-radius: 50%;
    background: radial-gradient(circle at 50% 42%, rgba(168,136,74,.22), rgba(168,136,74,.07) 62%, rgba(168,136,74,0) 78%);
    border: 1px solid rgba(168,136,74,.45);
    transform: scale(.34); will-change: transform; pointer-events: none; }

  .stage-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; pointer-events: none; }
  .phase-label { font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: .26em; text-transform: uppercase; color: var(--brass); min-height: 14px; opacity: 0; transition: opacity .4s; }
  .phase-count { font-family: var(--serif); font-size: clamp(48px, 12vw, 68px); line-height: 1; color: var(--text-1); font-variant-numeric: tabular-nums; opacity: 0; transition: opacity .4s; }
  .stage-hint  { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--text-3); transition: opacity .4s; }

  .atem.running .phase-label, .atem.running .phase-count { opacity: 1; }
  .atem.running .stage-hint { opacity: 0; }

  .atem-foot { margin-top: 44px; font-family: var(--sans); font-size: 12px; letter-spacing: .04em; color: var(--text-3); }
  .atem-back { display: inline-block; margin-top: 20px; font-family: var(--sans); font-size: 11.5px; letter-spacing: .1em; color: var(--text-3); text-decoration: none; transition: color .25s; }
  .atem-back:hover { color: var(--burgundy); }

  @media (prefers-reduced-motion: reduce) { .orb, .ring-arc { transition: none !important; } }
</style>
</head>
<body>
  <div class="atem" id="atem">
    <span class="atem-eb">Origo · Atem</span>
    <h1 class="atem-title"><span class="latin">Loslassen</span></h1>
    <p class="atem-rhythm">3 · 6 · 9</p>
    <p class="atem-sub">Kurz ein, lange halten, langsam aus. Die Ausatmung trägt doppelt so weit wie der Atem hinein.</p>

    <div class="stage" id="stage" role="button" tabindex="0" aria-label="Atem starten oder pausieren">
      <svg viewBox="0 0 320 320">
        <circle class="ring-track" cx="160" cy="160" r="150"></circle>
        <circle class="ring-arc"   cx="160" cy="160" r="150" id="arc"></circle>
      </svg>
      <div class="orb" id="orb"></div>
      <div class="stage-center">
        <span class="phase-label" id="phaseLabel"></span>
        <span class="phase-count" id="phaseCount"></span>
        <span class="stage-hint" id="hint">Beginnen</span>
      </div>
    </div>

    <p class="atem-foot"><span id="footCycles">0 Atemzüge</span></p>
    <a class="atem-back" href="/atem-ring/">← Weitere Atemrhythmen</a>
  </div>

<script>
(function(){
  var PHASES = [ {l:'Einatmen',d:3,s:1}, {l:'Halten',d:6,s:1}, {l:'Ausatmen',d:9,s:0} ];
  var MIN = 0.34, MAX = 1.0;

  var atem = document.getElementById('atem');
  var orb = document.getElementById('orb');
  var arc = document.getElementById('arc');
  var phaseLabel = document.getElementById('phaseLabel');
  var phaseCount = document.getElementById('phaseCount');
  var footCycles = document.getElementById('footCycles');
  var stage = document.getElementById('stage');

  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var CIRC = 2 * Math.PI * 150;
  arc.style.strokeDasharray = CIRC;
  arc.style.strokeDashoffset = CIRC;

  var running = false, pi = 0, phaseTimer = null, countRAF = null, cycles = 0;
  var orbAnim = null, arcAnim = null, lastScale = MIN;

  function resetVisual(){
    cycles = 0; footCycles.textContent = '0 Atemzüge';
    if (orbAnim) { orbAnim.cancel(); orbAnim = null; }
    if (arcAnim) { arcAnim.cancel(); arcAnim = null; }
    lastScale = MIN;
    orb.style.transform = 'scale(' + MIN + ')';
    arc.style.strokeDashoffset = CIRC;
  }

  function runPhase(){
    var ph = PHASES[pi];
    var dur = ph.d;
    phaseLabel.textContent = ph.l;
    var targetScale = MIN + ph.s * (MAX - MIN);

    if (orbAnim) orbAnim.cancel();
    if (arcAnim) arcAnim.cancel();
    orb.style.transform = 'scale(' + lastScale + ')';

    if (reduce) {
      orb.style.transform = 'scale(' + targetScale + ')';
      arc.style.strokeDashoffset = 0;
    } else {
      orbAnim = orb.animate(
        [ { transform: 'scale(' + lastScale + ')' }, { transform: 'scale(' + targetScale + ')' } ],
        { duration: dur * 1000, easing: 'cubic-bezier(.42,0,.58,1)', fill: 'forwards' }
      );
      arcAnim = arc.animate(
        [ { strokeDashoffset: CIRC }, { strokeDashoffset: 0 } ],
        { duration: dur * 1000, easing: 'linear', fill: 'forwards' }
      );
    }
    lastScale = targetScale;

    var end = performance.now() + dur * 1000;
    function tick(){
      var rem = Math.max(0, (end - performance.now()) / 1000);
      phaseCount.textContent = Math.ceil(rem);
      if (rem > 0 && running) countRAF = requestAnimationFrame(tick);
    }
    if (countRAF) cancelAnimationFrame(countRAF);
    tick();

    phaseTimer = setTimeout(function(){
      pi++;
      if (pi >= PHASES.length) { pi = 0; cycles++; footCycles.textContent = cycles + (cycles === 1 ? ' Atemzug' : ' Atemzüge'); }
      if (running) runPhase();
    }, dur * 1000);
  }

  function start(){ running = true; atem.classList.add('running'); pi = 0; runPhase(); }
  function stop(){ running = false; atem.classList.remove('running'); if (phaseTimer) clearTimeout(phaseTimer); if (countRAF) cancelAnimationFrame(countRAF); resetVisual(); }
  function toggle(){ if (running) stop(); else start(); }

  stage.addEventListener('click', toggle);
  stage.addEventListener('keydown', function(e){ if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); } });

  resetVisual();
})();
</script>
</body>
</html>
