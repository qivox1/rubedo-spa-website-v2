<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, follow">
<title>Seite nicht gefunden — Rubedo Spa Minden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FBF8F1; --burgundy: #6B1E2A; --brass: #A8884A;
    --gold: #7A6830; --gold-l: #8B7A40;
    --text-1: #1C1712; --text-2: #5C5347; --text-3: #9A8E82;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cream); color: var(--text-1); font-family: var(--sans);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 48px 24px;
  }
  .nf-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase;
    color: var(--brass); margin-bottom: 26px;
  }
  h1 {
    font-family: var(--serif); font-weight: 300; font-style: italic;
    font-size: clamp(34px, 5.5vw, 58px); line-height: 1.12; color: var(--text-1);
    max-width: 15em; margin: 0 auto 22px;
  }
  .nf-text {
    font-family: var(--serif); font-size: 18px; font-weight: 400;
    color: var(--text-2); max-width: 34em; margin: 0 auto 40px; line-height: 1.6;
  }
  .nf-cta {
    display: inline-flex; align-items: center; padding: 12px 26px;
    background: var(--gold); color: var(--cream); text-decoration: none;
    font-size: 11px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase;
    border-radius: 2px; transition: background .2s;
  }
  .nf-cta:hover { background: var(--gold-l); }
  .nf-alt { margin-top: 26px; font-size: 12px; letter-spacing: .04em; }
  .nf-alt a { color: var(--text-3); text-decoration: none; border-bottom: .5px solid var(--text-3); padding-bottom: 1px; transition: color .2s; }
  .nf-alt a:hover { color: var(--text-1); }
  .nf-sigil { margin-top: 64px; font-family: var(--serif); font-style: italic; font-size: 14px; color: var(--burgundy); }
</style>
</head>
<body>
<main>
  <p class="nf-eyebrow">404 &nbsp;·&nbsp; Seite nicht gefunden</p>
  <h1>Dieser Weg führt hier nicht weiter.</h1>
  <p class="nf-text">Die angeforderte Seite existiert nicht oder ist umgezogen. Alles Wesentliche beginnt auf der Startseite.</p>
  <a class="nf-cta" href="/">Zur Startseite</a>
  <p class="nf-alt"><a href="/magazin/">Oder weiter im Magazin&nbsp;→</a></p>
  <p class="nf-sigil">Rubedo Spa · Minden</p>
</main>
</body>
</html>
